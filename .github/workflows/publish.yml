name: CI / Publish to PyPI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

# Prevent duplicate runs: when a tag is pushed alongside a branch update,
# GitHub fires two push events. The branch-push run is redundant — the
# tag-push run already covers CI + publish. Concurrency cancels the
# branch run as soon as the tag run starts (same group key).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write   # write required to create GitHub Releases
  id-token: write   # required for OIDC trusted publisher (PyPI)

jobs:
  # ── 1. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check tools/ clients/ tests/ audit/

      - name: Run tests
        run: pytest --tb=short

  # ── 2. Pre-publish audit ───────────────────────────────────────────────────
  audit:
    name: Pre-publish audit vs mcp-einvoicing-core
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + core
        run: pip install -e ".[dev]"

      - name: Run pre-publish audit
        # Exit code 2 = blocking failures → job fails → publish is blocked
        # Exit code 1 = warnings only     → job passes (informational)
        run: python audit/audit_vs_core.py --output audit/report.json --fail-on blocking

      - name: Upload audit report
        if: always()   # Upload even on failure so the report is inspectable
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit/report.json

  # ── 3. Build distribution ──────────────────────────────────────────────────
  build:
    name: Build distribution packages
    needs: audit
    runs-on: ubuntu-latest
    # Only build on tag pushes
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/

  # ── 4. Publish to PyPI ─────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish on tag pushes; audit must have passed (via the needs chain)
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/mcp-facture-electronique-fr

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: Publish to PyPI via trusted publisher (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed — uses GitHub OIDC trusted publisher.
        # Configure the trusted publisher at:
        # https://pypi.org/manage/project/mcp-facture-electronique-fr/settings/publishing/

  # ── 5. Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
